    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body { font-family: 'Noto Sans Thai', sans-serif; }
        .hidden { display: none; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .product-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
        .group:hover .product-img { transform: scale(1.05); }
        .page-fade { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Image slider */
        .img-slider-track {
            display: flex;
            transition: transform 0.35s cubic-bezier(.4,0,.2,1);
            user-select: none;
        }
        .img-slide { min-width: 100%; width: 100%; flex-shrink: 0; position: relative; }
        .dot { transition: all 0.3s; }
        .dot.active { background: #60a5fa; width: 18px; border-radius: 4px; }

        /* Lightbox */
        #lightbox {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 200;
            background: rgba(15,23,42,0.92);
            backdrop-filter: blur(8px);
            align-items: center;
            justify-content: center;
            padding: 24px;
            touch-action: pan-y;
        }
        #lightbox.show { display: flex; animation: fadeIn 0.2s ease; }
        #lightbox-img {
            max-width: 100%;
            max-height: 85vh;
            border-radius: 1.5rem;
            object-fit: contain;
            box-shadow: 0 25px 60px rgba(0,0,0,0.4);
            user-select: none;
            pointer-events: none;
        }
        #lightbox-close {
            position: absolute;
            top: 20px; right: 20px;
            width: 40px; height: 40px;
            background: white;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
        }
        /* ปุ่มลูกศรใน Lightbox */
        .lightbox-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 40px; height: 40px;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            z-index: 10;
            transition: background 0.2s;
        }
        .lightbox-arrow:active { background: rgba(255,255,255,0.3); }
        #lightbox-prev { left: 12px; }
        #lightbox-next { right: 12px; }
        /* dot indicators ใน Lightbox */
        #lightbox-dots {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 6px;
            z-index: 10;
        }
        .lb-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transition: all 0.3s;
        }
        .lb-dot.active { background: white; width: 18px; border-radius: 4px; }

        .img-clickable { cursor: zoom-in; }
    </style>
</head>

        // ==========================================================================
        // Lightbox — พร้อม swipe และ เลื่อนซ้าย/ขวา
        // ==========================================================================
        var lbImgs = [];
        var lbIndex = 0;

        function openLightbox(imgs, index) {
            // รองรับทั้ง openLightbox(src) และ openLightbox([...], index)
            if (typeof imgs === 'string') { lbImgs = [imgs]; lbIndex = 0; }
            else { lbImgs = imgs; lbIndex = index || 0; }

            updateLightboxImage();

            // สร้าง dots
            var dotsEl = document.getElementById('lightbox-dots');
            dotsEl.innerHTML = '';
            if (lbImgs.length > 1) {
                lbImgs.forEach(function(_, i) {
                    var d = document.createElement('div');
                    d.className = 'lb-dot' + (i === lbIndex ? ' active' : '');
                    dotsEl.appendChild(d);
                });
            }

            // ซ่อนลูกศรถ้ามีรูปเดียว
            document.getElementById('lightbox-prev').style.display = lbImgs.length > 1 ? 'flex' : 'none';
            document.getElementById('lightbox-next').style.display = lbImgs.length > 1 ? 'flex' : 'none';

            document.getElementById('lightbox').classList.add('show');
            initLightboxSwipe();
        }

        function updateLightboxImage() {
            document.getElementById('lightbox-img').src = lbImgs[lbIndex];
            // อัพเดท dots
            document.querySelectorAll('#lightbox-dots .lb-dot').forEach(function(d, i) {
                d.classList.toggle('active', i === lbIndex);
            });
        }

        function lightboxSlide(dir) {
            lbIndex = (lbIndex + dir + lbImgs.length) % lbImgs.length;
            updateLightboxImage();
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('show');
        }

        // Swipe สำหรับ Lightbox
        function initLightboxSwipe() {
            var lb = document.getElementById('lightbox');
            var startX = 0;
            lb.ontouchstart = function(e) { startX = e.touches[0].clientX; };
            lb.ontouchend = function(e) {
                var diff = startX - e.changedTouches[0].clientX;
                if (Math.abs(diff) > 50) lightboxSlide(diff > 0 ? 1 : -1);
            };
            // คลิก backdrop ปิด (ยกเว้นคลิกที่ปุ่มลูกศรและปุ่มปิด)
            lb.onclick = function(e) {
                if (e.target === lb || e.target === document.getElementById('lightbox-img')) closeLightbox();
            };
        }

        // ==========================================================================
        // Image Slider ในการ์ด — พร้อม touch swipe
        // ==========================================================================
        function slideImg(cardId, dir) {
            var track = document.getElementById('track-' + cardId);
            var dots  = document.querySelectorAll('#dots-' + cardId + ' .dot');
            var total = track.children.length;
            var current = parseInt(track.dataset.current || 0);
            current = (current + dir + total) % total;
            track.dataset.current = current;
            track.style.transform = 'translateX(-' + (current * 100) + '%)';
            dots.forEach(function(d, i) { d.classList.toggle('active', i === current); });
        }

        function initSliderSwipe(cardId) {
            var track = document.getElementById('track-' + cardId);
            if (!track) return;
            var startX = 0;
            track.addEventListener('touchstart', function(e) {
                startX = e.touches[0].clientX;
            }, { passive: true });
            track.addEventListener('touchend', function(e) {
                var diff = startX - e.changedTouches[0].clientX;
                if (Math.abs(diff) > 40) slideImg(cardId, diff > 0 ? 1 : -1);
            }, { passive: true });
        }

        function openBrief(productTitle, fields) {
            activeProductTitle = productTitle;
            activeBriefFields = fields || [];
            document.getElementById('modal-product-title').innerText = productTitle;
            var container = document.getElementById('brief-form-fields');
            container.innerHTML = '';

            activeBriefFields.forEach(function(field, index) {
                var wrapper = document.createElement('div');
                var label = document.createElement('label');
                label.className = 'text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1 mb-1.5 block';
                label.innerText = field.label;
                var input;
                if (field.type === 'textarea') {
                    input = document.createElement('textarea');
                    input.rows = 3;
                    input.className = 'w-full bg-slate-50 border border-slate-100 rounded-2xl py-3 px-5 text-sm focus:outline-none focus:border-blue-200 resize-none transition-all';
                } else if (field.type === 'select') {
                    input = document.createElement('select');
                    input.className = 'w-full bg-slate-50 border border-slate-100 rounded-2xl py-3 px-5 text-sm focus:outline-none focus:border-blue-200 transition-all';
                    field.options.forEach(function(opt) {
                        var option = document.createElement('option');
                        option.value = opt;
                        option.innerText = opt;
                        input.appendChild(option);
                    });
                } else {
                    input = document.createElement('input');
                    input.type = 'text';
                    input.className = 'w-full bg-slate-50 border border-slate-100 rounded-2xl py-3 px-5 text-sm focus:outline-none focus:border-blue-200 transition-all';
                }
                input.id = 'dynamic-input-' + index;
                if (field.type !== 'select') input.placeholder = field.placeholder;
                wrapper.appendChild(label);
                wrapper.appendChild(input);
                container.appendChild(wrapper);
            });

            document.getElementById('brief-modal').classList.replace('hidden', 'flex');
            lucide.createIcons();
        }

        function handleCopyBrief() {
            var textToCopy = '📋 บรีฟงาน: ' + activeProductTitle + '\n';
            activeBriefFields.forEach(function(field, index) {
                var val = document.getElementById('dynamic-input-' + index).value || '-';
                textToCopy += '✨ ' + field.label + ': ' + val + '\n';
            });
            var temp = document.createElement('textarea');
            temp.value = textToCopy;
            document.body.appendChild(temp);
            temp.select();
            document.execCommand('copy');
            document.body.removeChild(temp);

            var btn = document.getElementById('copy-btn');
            var btnText = document.getElementById('copy-btn-text');
            btn.classList.replace('bg-blue-500', 'bg-green-500');
            btnText.innerText = 'คัดลอกสำเร็จ!';
            setTimeout(function() {
                btn.classList.replace('bg-green-500', 'bg-blue-500');
                btnText.innerText = 'คัดลอกข้อมูลบรีฟ';
            }, 2000);
        }

                            '<div class="w-16 h-16 bg-yellow-50 rounded-full flex items-center justify-center mx-auto mb-4"><i data-lucide="pen-tool" class="text-yellow-400" size="32"></i></div>' +
                            '<h3 class="font-bold text-gray-700 mb-2">สนใจงานคัสตอมพิเศษ?</h3>' +
                            '<p class="text-[11px] text-gray-400 leading-relaxed mb-6 px-4">หากต้องการสั่งเว็บหรืออกแบบตามความต้องการเฉพาะบุคคล สามารถกดปุ่มบรีฟด้านล่างเพื่อเตรียมรายละเอียดได้เลยค่ะ ✨</p>' +
                            '<button onclick="openBrief(\'งานคัสตอมพิเศษ (Custom Work)\', customWorks[0].brief)" class="w-full py-4 bg-yellow-400 hover:bg-yellow-500 text-white font-black rounded-2xl shadow-lg shadow-yellow-100 flex items-center justify-center gap-3 transition-all active:scale-95"><i data-lucide="sparkles" size="18"></i> บรีฟงาน (Custom)</button>' +
                        '</div>' +
                    '</section>';
            }

            container.innerHTML +=
                '<div class="mt-8 mb-4 p-5 bg-white border border-slate-100 rounded-[2rem] shadow-sm text-center"><p class="text-[10px] font-medium text-gray-400 leading-relaxed">สามารถเลือกเว็บที่ต้องการ กดดูรายละเอียดบรีฟงาน<br>และคัดลอกบรีฟส่งมาให้ทางเราได้เลยค่ะ</p></div>' +
                '<div class="text-center px-8 pb-10"><p class="text-[10px] font-bold text-gray-300 leading-relaxed uppercase tracking-widest">ขอบคุณที่แวะมาชมผลงานนะคะ ✨</p></div>';

            lucide.createIcons();

            // เพิ่ม touch swipe ให้ทุก slider ที่มีหลายรูป
            var allCards = [].concat(newProducts, regularProducts, services, customWorks);
            allCards.forEach(function(p) {
                if ((p.imgs || []).filter(Boolean).length > 1) {
                    initSliderSwipe(p.id);
                }
            });
        }

        function showPage(n) {
            currentPage = n;
            document.querySelectorAll('nav button').forEach(function(btn) {
                btn.classList.remove('text-blue-500', 'bg-blue-50', 'shadow-sm');
                btn.classList.add('text-gray-300');
            });
            var activeNav = document.getElementById('nav-' + n);
            activeNav.classList.remove('text-gray-300');
            activeNav.classList.add('text-blue-500', 'bg-blue-50', 'shadow-sm');
            var titles = { 1: 'KOSAME WEBAPP', 2: 'SERVICES', 3: 'CUSTOM' };
            document.getElementById('title-text').innerText = titles[n];
            renderPage();
        }

        renderPage();
    </script>
</body>
</html>
